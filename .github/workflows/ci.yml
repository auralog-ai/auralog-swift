name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-test:
    name: Swift test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Show Swift version
        run: swift --version
      - name: Test package
        run: swift test
      - name: Build SwiftUI example
        run: swift build --package-path Examples/SwiftUIExample
