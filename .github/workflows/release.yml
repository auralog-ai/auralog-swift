name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "*.*.*-*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Validate tag appears in changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          grep -F "## ${TAG}" CHANGELOG.md
      - name: Test package
        run: swift test
      - name: Build SwiftUI example
        run: swift build --package-path Examples/SwiftUIExample
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -f ".github/releases/${TAG}.md" ]; then
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release edit "${TAG}" --title "${TAG}" --notes-file ".github/releases/${TAG}.md" --prerelease
            else
              gh release create "${TAG}" --title "${TAG}" --notes-file ".github/releases/${TAG}.md" --verify-tag --prerelease
            fi
          else
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release edit "${TAG}" --title "${TAG}" --prerelease
            else
              gh release create "${TAG}" --title "${TAG}" --generate-notes --verify-tag --prerelease
            fi
          fi
